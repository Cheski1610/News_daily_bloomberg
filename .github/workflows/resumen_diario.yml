name: Resumen Diario Bloomberg Línea

on:
  schedule:
    # 20:00 hora local — ajusta el offset según tu zona horaria:
    #   UTC-3 (Argentina/Uruguay/Brasil) → 23:00 UTC  →  cron: '0 23 * * *'
    #   UTC-4 (Venezuela/Chile/Paraguay) → 00:00 UTC  →  cron: '0 0 * * *'
    #   UTC-5 (Colombia/Perú/Ecuador)    → 01:00 UTC  →  cron: '0 1 * * *'
    - cron: '0 2 * * *'
  workflow_dispatch: # permite lanzarlo manualmente desde la pestaña Actions

jobs:
  resumen:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar resumen
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_SERVER: smtp.gmail.com
          SMTP_PORT: "465"
        run: python main.py
